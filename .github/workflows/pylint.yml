# Version: 0.0.1
name: Pylint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - created

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pylint and lint dependencies
        run: python -m pip install --upgrade pip pylint homeassistant aiohttp voluptuous

      - name: Run pylint
        env:
          PY_COLORS: "1"
        run: |
          pylint --output-format=colorized --rcfile=.pylintrc custom_components/info_lan_for_home_assistant | tee pylint-report.txt

      - name: Upload pylint report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pylint-report
          path: pylint-report.txt
